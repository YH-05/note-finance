# finance - Docker Compose 開発環境設定
# 使い方: docker compose run --rm dev claude

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-dev
    stdin_open: true  # インタラクティブ入力（-i）
    tty: true         # ターミナル割り当て（-t）
    volumes:
      # プロジェクトソース（リアルタイム編集可能）
      - .:/app

      # Claude Code 設定・履歴の永続化
      - claude-config:/root/.claude

      # Git 設定の共有（ホストから読み取り専用）
      - ~/.gitconfig:/root/.gitconfig:ro

      # SSH 鍵の共有（GitHub push/pull 用）
      - ~/.ssh:/root/.ssh:ro

      # GitHub CLI 認証の共有
      - ~/.config/gh:/root/.config/gh

      # Python .venv をコンテナ内に隔離（パフォーマンス向上）
      - venv:/app/.venv

    environment:
      # API キー（.env ファイルから読み込み）
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FRED_API_KEY=${FRED_API_KEY:-}
      - GH_TOKEN=${GH_TOKEN:-}
      # アプリケーション設定
      - LOG_LEVEL=INFO
      - PROJECT_ENV=development
      - TERM=xterm-256color

    working_dir: /app

  neo4j:
    image: neo4j:5-community
    container_name: finance-neo4j
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    volumes:
      - /Volumes/NeoData/neo4j/data:/data
      - /Volumes/NeoData/neo4j/logs:/logs
      - /Volumes/NeoData/neo4j/plugins:/plugins
      - /Volumes/NeoData/neo4j/import:/var/lib/neo4j/import
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-gomasuke}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    restart: unless-stopped

  neo4j-research:
    image: neo4j:5-community
    container_name: research-neo4j
    ports:
      - "7475:7474"  # Browser UI (+1 で既存と分離)
      - "7688:7687"  # Bolt protocol (+1 で既存と分離)
    volumes:
      - /Volumes/NeoData/neo4j-research/data:/data
      - /Volumes/NeoData/neo4j-research/logs:/logs
      - /Volumes/NeoData/neo4j-research/plugins:/plugins
      - /Volumes/NeoData/neo4j-research/import:/var/lib/neo4j/import
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-gomasuke}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  neo4j-article:
    image: neo4j:5-community
    container_name: article-neo4j
    ports:
      - "7476:7474"  # Browser UI (+2 で既存と分離)
      - "7689:7687"  # Bolt protocol (+2 で既存と分離)
    volumes:
      - /Volumes/NeoData/neo4j-article/data:/data
      - /Volumes/NeoData/neo4j-article/logs:/logs
      - /Volumes/NeoData/neo4j-article/plugins:/plugins
      - /Volumes/NeoData/neo4j-article/import:/var/lib/neo4j/import
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-gomasuke}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  claude-config:  # Claude Code 設定の永続化
  venv:           # Python 仮想環境の隔離
