    tags: ["macro", "strategy", "weekly"]
    article_selector: "div.article-list a, div.research-item a, a.report-link"

  - key: "vanguard"
    name: "Vanguard"
    tier: "buy_side"
    listing_url: "https://advisors.vanguard.com/insights/article/series/market-perspectives"
    rendering: "static"
    tags: ["macro", "market_perspectives"]
    article_selector: "div.article-list a, div.card-list a.card-link, a.article-link"

  - key: "goldman_sachs"
    name: "Goldman Sachs Research"
    tier: "sell_side"
    listing_url: "https://www.goldmansachs.com/insights/goldman-sachs-research"
