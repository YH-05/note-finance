# Knowledge Graph Schema Definition
# Neo4j graph database schema for finance knowledge management
#
# Usage:
#   - This file defines the canonical graph schema (SSoT)
#   - mcp-neo4j-data-modeling can import/export compatible models
#   - Schema changes should be made here first, then applied to Neo4j
#
# Changelog:
#   v2.1 (2026-03-17): Question node for knowledge gap structuring
#     - Added: Question node with question_type (4 types) and priority/status
#     - Added: ASKS_ABOUT (Question -> Entity), MOTIVATED_BY (Question -> Claim/Fact/Insight),
#              ANSWERED_BY (Question -> Fact/Claim/Source) relationships
#   v2.0 (2026-03-12): Claim-centric redesign
#     - Added: Chunk, FinancialDataPoint, FiscalPeriod, Insight nodes
#     - Expanded: Claim.claim_type (10 types), Fact.fact_type (8 types), Entity.entity_type (+country, instrument)
#     - Enhanced: SUPPORTED_BY with strength/reasoning properties
#     - Added: CONTAINS_CHUNK, HAS_DATAPOINT, FOR_PERIOD, DERIVED_FROM, VALIDATES, CHALLENGES relationships
#     - Design decisions:
#       - Fact = strictly verified past objective info only
#       - Recommendation/ValuationAssumption → unified under Claim
#       - Insight node for AI-generated knowledge circulation
#   v1.0 (2026-03-11): Initial schema with 6 nodes, 9 relationships

version: "2.1"

# ============================================================
# Node Definitions
# ============================================================
nodes:
  Source:
    description: "Information source (web page, news article, PDF report, original article)"
    properties:
      source_id:
        type: string
        unique: true
        required: true
        description: "Unique identifier (UUID or SHA-256 hash for PDFs)"
      title:
        type: string
        required: true
        indexed: true
      url:
        type: string
        indexed: true
        description: "Source URL (null for local documents)"
      source_type:
        type: string
        required: true
        enum: [web, news, pdf, original]
        indexed: true
        description: "web=website, news=news article, pdf=report PDF, original=self-authored"
      publisher:
        type: string
        indexed: true
        description: "Publisher or organization name"
      published_at:
        type: datetime
        indexed: true
      fetched_at:
        type: datetime
        required: true
      language:
        type: string
        default: "ja"
      file_path:
        type: string
        description: "Local file path (for PDF and original documents)"
      source_hash:
        type: string
        indexed: true
        description: "SHA-256 hash of the source file (for deduplication)"

  Author:
    description: "Author or publishing organization"
    properties:
      author_id:
        type: string
        unique: true
        required: true
      name:
        type: string
        required: true
        indexed: true
      author_type:
        type: string
        required: true
        enum: [person, sell_side, buy_side, consultant, media, self]
        indexed: true
        description: "person=individual, sell_side=investment bank, buy_side=asset manager, consultant=consulting firm, media=news outlet, self=own content"
      organization:
        type: string
        indexed: true

  Chunk:
    description: "Section-level text chunk from a source document (Lexical layer)"
    properties:
      chunk_id:
        type: string
        unique: true
        required: true
        description: "Format: {source_hash}_chunk_{index}"
      chunk_index:
        type: integer
        required: true
        description: "0-based index within the source document"
      section_title:
        type: string
        indexed: true
        description: "Section heading (e.g., 'Valuation', 'Revenue Breakdown')"
      content:
        type: string
        required: true
        description: "Full text content of the chunk (Markdown)"
      char_count:
        type: integer
        description: "Character count for chunk size tracking"
      has_tables:
        type: boolean
        default: false
        description: "Whether this chunk contains tabular data"
      created_at:
        type: datetime
        required: true

  Fact:
    description: "Objectively verifiable past information extracted from sources. Strictly limited to verified, historical, objective data."
    properties:
      fact_id:
        type: string
        unique: true
        required: true
      content:
        type: string
        required: true
        description: "Fact statement"
      fact_type:
        type: string
        enum: [statistic, event, data_point, quote, policy_action, economic_indicator, regulatory, corporate_action]
        indexed: true
        description: >
          statistic=numerical data, event=occurrence, data_point=metric,
          quote=direct citation, policy_action=central bank/government action,
          economic_indicator=GDP/CPI/PMI etc, regulatory=regulatory change,
          corporate_action=M&A/dividend/buyback etc
      as_of_date:
        type: date
        indexed: true
        description: "Date the fact refers to"
      created_at:
        type: datetime
        required: true

  Claim:
    description: >
      Subjective assertions, opinions, predictions, or judgments from sources.
      Includes recommendations, valuation assumptions, forecasts, sector views, and policy stances.
      Unified node for all non-factual statements — covers equity, sector, and macro reports.
    properties:
      claim_id:
        type: string
        unique: true
        required: true
      content:
        type: string
        required: true
        description: "Claim statement"
      claim_type:
        type: string
        enum: [opinion, prediction, recommendation, analysis, assumption, guidance, risk_assessment, policy_stance, sector_view, forecast]
        indexed: true
        description: >
          opinion=viewpoint, prediction=future expectation, recommendation=buy/sell/hold,
          analysis=interpretation, assumption=valuation/model assumption (e.g. WACC, Beta, discount rate),
          guidance=management guidance, risk_assessment=risk evaluation,
          policy_stance=monetary/fiscal policy view, sector_view=industry-level assessment,
          forecast=quantitative projection (e.g. revenue/EPS estimate)
      sentiment:
        type: string
        enum: [bullish, bearish, neutral, mixed]
        indexed: true
      magnitude:
        type: string
        enum: [strong, moderate, slight]
        description: "Strength of the sentiment or conviction"
      target_price:
        type: float
        description: "Target price (for recommendation claims)"
      rating:
        type: string
        description: "Rating label (e.g., Buy, Hold, Sell, Overweight)"
      time_horizon:
        type: string
        description: "Time horizon for the claim (e.g., '12M', 'FY26', 'long-term')"
      created_at:
        type: datetime
        required: true

  Entity:
    description: "Named entities referenced in facts and claims (companies, indices, sectors, countries, etc.)"
    properties:
      entity_id:
        type: string
        unique: true
        required: true
      name:
        type: string
        required: true
        indexed: true
      entity_type:
        type: string
        required: true
        enum: [company, index, sector, indicator, currency, commodity, person, organization, country, instrument]
        indexed: true
        description: >
          company=publicly traded company, index=stock index, sector=industry sector,
          indicator=economic indicator, currency=currency pair, commodity=commodity,
          person=individual, organization=non-market org, country=sovereign nation,
          instrument=financial instrument (bond, derivative, etc.)
      ticker:
        type: string
        indexed: true
        description: "Stock ticker symbol (if applicable)"
      aliases:
        type: string[]
        description: "Alternative names (e.g., ['Indosat', 'ISAT', 'Indosat Ooredoo Hutchison'])"
      isin:
        type: string
        indexed: true
        description: "ISIN code (if applicable)"

  FinancialDataPoint:
    description: >
      Structured numerical data extracted from tables and text.
      Supports both actual (historical) and estimated (forecast) values via is_estimate flag.
    properties:
      datapoint_id:
        type: string
        unique: true
        required: true
        description: "Format: {source_hash}_{metric}_{period}"
      metric_name:
        type: string
        required: true
        indexed: true
        description: "Metric name (e.g., 'Revenue', 'EBITDA', 'ARPU', 'Net Income')"
      value:
        type: float
        required: true
        description: "Numeric value"
      unit:
        type: string
        required: true
        description: "Unit (e.g., 'IDR bn', 'USD mn', '%', 'x')"
      is_estimate:
        type: boolean
        required: true
        default: false
        indexed: true
        description: "true=analyst estimate/forecast, false=actual reported figure"
      currency:
        type: string
        description: "ISO 4217 currency code (e.g., 'IDR', 'USD')"
      created_at:
        type: datetime
        required: true

  FiscalPeriod:
    description: "Fiscal period for normalizing time references across reports"
    properties:
      period_id:
        type: string
        unique: true
        required: true
        description: "Format: {entity_ticker}_{period_label} (e.g., 'ISAT_FY2025')"
      period_type:
        type: string
        required: true
        enum: [annual, quarterly, half_year, monthly]
        indexed: true
      period_label:
        type: string
        required: true
        indexed: true
        description: "Human-readable label (e.g., 'FY2025', '4Q25', '1H26')"
      start_date:
        type: date
        description: "Period start date"
      end_date:
        type: date
        description: "Period end date"

  Topic:
    description: "Topic or theme tag"
    properties:
      topic_id:
        type: string
        unique: true
        required: true
      name:
        type: string
        required: true
        indexed: true
      category:
        type: string
        enum: [macro, sector, stock, ai, finance, geopolitics, policy, valuation, earnings]
        indexed: true

  Stance:
    description: >
      Analyst investment stance snapshot (Rating + TP + Sentiment).
      Tracked per Author per Entity over time via SUPERSEDES chain.
    properties:
      stance_id:
        type: string
        unique: true
        required: true
        description: "Deterministic UUID5(author:entity:date)"
      rating:
        type: string
        indexed: true
        description: "Rating label (e.g., Buy, Hold, Sell, Overweight)"
      sentiment:
        type: string
        enum: [bullish, bearish, neutral, mixed]
        indexed: true
      target_price:
        type: float
        description: "Target price value"
      target_price_currency:
        type: string
        description: "ISO 4217 currency code for target price (e.g., 'USD', 'IDR')"
      as_of_date:
        type: date
        required: true
        indexed: true
        description: "Date the stance was expressed"
      created_at:
        type: datetime
        required: true

  Insight:
    description: >
      AI-generated analytical output. Stores creative synthesis, contradiction detection,
      evidence gap analysis, hypotheses, and pattern recognition.
      Part of the knowledge circulation loop: Accumulate → Link → Discover → Create → Act.
    properties:
      insight_id:
        type: string
        unique: true
        required: true
        description: "Format: ins-{YYYY-MM-DD}-{sequential}"
      insight_type:
        type: string
        required: true
        enum: [synthesis, contradiction, gap, hypothesis, pattern]
        indexed: true
        description: >
          synthesis=cross-source integration, contradiction=conflicting claims detected,
          gap=missing information identified, hypothesis=AI-generated testable prediction,
          pattern=recurring theme or trend
      content:
        type: string
        required: true
        description: "The insight text"
      model:
        type: string
        description: "AI model that generated this insight (e.g., 'claude-opus-4-6')"
      generated_at:
        type: datetime
        required: true
      status:
        type: string
        enum: [draft, validated, invalidated, archived]
        default: "draft"
        indexed: true
        description: "Lifecycle status of the insight"

  Question:
    description: >
      Knowledge gap identified during extraction.
      Represents what is missing, contradictory, or needs verification.
      Used by AI to structure follow-up research priorities.
    properties:
      question_id:
        type: string
        unique: true
        required: true
        description: "Deterministic SHA-256[:32] hash of 'question:' + content"
      content:
        type: string
        required: true
        description: "The question text describing the knowledge gap"
      question_type:
        type: string
        required: true
        enum: [data_gap, contradiction, prediction_test, assumption_check, consensus_divergence]
        indexed: true
        description: >
          data_gap=missing important information in this report,
          contradiction=claim conflicts with general consensus,
          prediction_test=quantitative prediction verifiable later,
          assumption_check=assumption requiring verification,
          consensus_divergence=rating/TP divergence among multiple analysts on same entity
      priority:
        type: string
        enum: [high, medium, low]
        indexed: true
        description: "Priority level for follow-up research"
      status:
        type: string
        enum: [open, investigating, answered, dismissed]
        default: "open"
        indexed: true
        description: "Lifecycle status of the question"
      generated_at:
        type: datetime
        required: true
        description: "When this question was generated"

# ============================================================
# Relationship Definitions
# ============================================================
relationships:
  # Source -> Chunk (Lexical layer)
  CONTAINS_CHUNK:
    from: Source
    to: Chunk
    description: "Source document contains this text chunk"
    properties:
      chunk_order:
        type: integer
        description: "Order of chunk within the source"

  # Chunk -> Fact / Claim (Extraction provenance)
  EXTRACTED_FROM:
    from: [Fact, Claim, FinancialDataPoint]
    to: Chunk
    description: "This extraction was derived from this chunk"
    properties:
      extracted_at:
        type: datetime
      extraction_method:
        type: string
        description: "Method used (e.g., 'llm_gemini', 'llm_claude', 'rule_based')"

  # Source -> Fact / Claim (backward compat, also used for non-chunked sources)
  STATES_FACT:
    from: Source
    to: Fact
    description: "Source states an objective fact"
    properties:
      extracted_at:
        type: datetime
      page_or_section:
        type: string
        description: "Page number or section reference"

  MAKES_CLAIM:
    from: Source
    to: Claim
    description: "Source makes a subjective claim"
    properties:
      extracted_at:
        type: datetime
      page_or_section:
        type: string

  # Evidence chain: Claim -> Fact (enhanced)
  SUPPORTED_BY:
    from: [Claim, Insight]
    to: [Fact, FinancialDataPoint, Claim]
    description: "Claim/Insight is supported by this evidence"
    properties:
      strength:
        type: string
        enum: [strong, moderate, weak, circumstantial]
        description: "How strongly this evidence supports the claim"
      reasoning:
        type: string
        description: "Explanation of why this evidence supports the claim"
      linked_at:
        type: datetime

  # Contradiction: Claim <-> Claim
  CONTRADICTS:
    from: Claim
    to: Claim
    description: "Two claims that contradict each other"
    properties:
      noted_at:
        type: datetime
      explanation:
        type: string
        description: "How/why the claims contradict"

  # Entity linking
  RELATES_TO:
    from: [Fact, FinancialDataPoint]
    to: Entity
    description: "Fact or data point references this entity"

  ABOUT:
    from: Claim
    to: Entity
    description: "Claim is about this entity"

  # Authorship
  AUTHORED_BY:
    from: Source
    to: Author
    description: "Source is authored by this person/organization"

  # Topic tagging
  TAGGED:
    from: [Source, Claim, Insight]
    to: Topic
    description: "Tagged with this topic"

  # FinancialDataPoint -> FiscalPeriod
  FOR_PERIOD:
    from: FinancialDataPoint
    to: FiscalPeriod
    description: "Data point is for this fiscal period"

  # FinancialDataPoint -> Source
  HAS_DATAPOINT:
    from: Source
    to: FinancialDataPoint
    description: "Source contains this financial data point"

  # Insight relationships (knowledge circulation)
  DERIVED_FROM:
    from: Insight
    to: [Fact, Claim, FinancialDataPoint, Insight]
    description: "Insight was derived from these inputs"
    properties:
      role:
        type: string
        description: "Role of the input in deriving the insight (e.g., 'primary', 'supporting', 'contrasting')"

  VALIDATES:
    from: Insight
    to: [Claim, Insight]
    description: "This insight validates/confirms the target"
    properties:
      validated_at:
        type: datetime

  CHALLENGES:
    from: Insight
    to: [Claim, Insight]
    description: "This insight challenges/questions the target"
    properties:
      challenged_at:
        type: datetime
      reason:
        type: string

  # Stance relationships (Wave 1)
  HOLDS_STANCE:
    from: Author
    to: Stance
    description: "Author holds/expressed this investment stance"

  ON_ENTITY:
    from: Stance
    to: Entity
    description: "Stance is about this entity (target company/index)"

  BASED_ON:
    from: Stance
    to: Claim
    description: "Stance is based on this claim (evidence link)"
    properties:
      role:
        type: string
        description: "Role of the claim (e.g., 'primary', 'supporting', 'contrasting')"

  SUPERSEDES:
    from: Stance
    to: Stance
    description: "This stance supersedes (replaces) the previous stance for the same (Author, Entity) pair"
    properties:
      superseded_at:
        type: datetime
        description: "When the old stance was superseded"

  # Temporal chain (Wave 3)
  NEXT_PERIOD:
    from: FiscalPeriod
    to: FiscalPeriod
    description: "Temporal ordering between fiscal periods of the same ticker and period_type"
    properties:
      gap_months:
        type: integer
        description: "Number of months between the two periods (e.g., 3 for quarterly, 6 for half-year, 12 for annual)"

  TREND:
    from: FinancialDataPoint
    to: FinancialDataPoint
    description: "Metric trend between consecutive periods for the same (entity, metric_key)"
    properties:
      change_pct:
        type: float
        description: "Percentage change from previous to current value"
      direction:
        type: string
        enum: [up, down, flat]
        description: "Trend direction: up if change_pct > 1, down if < -1, flat otherwise"
      metric_id:
        type: string
        indexed: true
        description: "Canonical metric_id from metric_master.json (null if unresolved)"

  # Causal chain (Wave 2)
  CAUSES:
    from: [Fact, Claim, FinancialDataPoint]
    to: [Fact, Claim, FinancialDataPoint]
    description: "Causal relationship between knowledge nodes (e.g., fact A causes claim B)"
    properties:
      mechanism:
        type: string
        description: "How/why the cause leads to the effect (e.g., 'revenue growth drives stock price')"
      confidence:
        type: string
        enum: [high, medium, low]
        description: "Confidence level of the causal link"
      source_id:
        type: string
        description: "Source document that states this causal relationship"
      from_label:
        type: string
        enum: [Fact, Claim, FinancialDataPoint]
        description: "Label of the from-node (Neo4j CE workaround for multi-label MATCH)"
      to_label:
        type: string
        enum: [Fact, Claim, FinancialDataPoint]
        description: "Label of the to-node (Neo4j CE workaround for multi-label MATCH)"

  # Question relationships (Wave 4)
  ASKS_ABOUT:
    from: Question
    to: Entity
    description: "Question asks about this entity"

  MOTIVATED_BY:
    from: Question
    to: [Claim, Fact, Insight]
    description: "Question was motivated by this claim, fact, or insight"

  ANSWERED_BY:
    from: Question
    to: [Fact, Claim, Source]
    description: "Question was answered by this fact, claim, or source"
    properties:
      answered_at:
        type: datetime
        description: "When the question was answered"

# ============================================================
# Constraints & Indices (for neo4j-pdf-constraints.cypher)
# ============================================================
constraints:
  - label: Source
    property: source_id
    type: UNIQUE
  - label: Author
    property: author_id
    type: UNIQUE
  - label: Chunk
    property: chunk_id
    type: UNIQUE
  - label: Fact
    property: fact_id
    type: UNIQUE
  - label: Claim
    property: claim_id
    type: UNIQUE
  - label: Entity
    property: entity_id
    type: UNIQUE
  - label: FinancialDataPoint
    property: datapoint_id
    type: UNIQUE
  - label: FiscalPeriod
    property: period_id
    type: UNIQUE
  - label: Topic
    property: topic_id
    type: UNIQUE
  - label: Insight
    property: insight_id
    type: UNIQUE
  - label: Stance
    property: stance_id
    type: UNIQUE
  - label: Question
    property: question_id
    type: UNIQUE

indices:
  - label: Fact
    property: fact_type
  - label: Fact
    property: as_of_date
  - label: Claim
    property: claim_type
  - label: Claim
    property: sentiment
  - label: Entity
    property: entity_type
  - label: Entity
    property: ticker
  - label: FinancialDataPoint
    property: metric_name
  - label: FinancialDataPoint
    property: is_estimate
  - label: FiscalPeriod
    property: period_label
  - label: Insight
    property: insight_type
  - label: Insight
    property: status
  - label: Source
    property: source_type
  - label: Source
    property: source_hash
  - label: Stance
    property: as_of_date
  - label: Stance
    property: rating
  - label: Stance
    property: sentiment
  - label: Question
    property: question_type
  - label: Question
    property: priority
  - label: Question
    property: status

# ============================================================
# Namespace Definitions
# ============================================================
namespaces:
  kg_v2:
    description: "KG v2 schema nodes for knowledge graph"
    labels:
      - Source
      - Author
      - Chunk
      - Fact
      - Claim
      - Entity
      - FinancialDataPoint
      - FiscalPeriod
      - Topic
      - Insight
      - Stance
      - Question
    naming: PascalCase

  conversation:
    description: "Conversation history tracking nodes"
    labels:
      - ConversationSession
      - ConversationTopic
      - Project
    naming: PascalCase

  memory:
    description: "MCP Memory nodes (root + sub-labels)"
    root_label: Memory
    sub_labels:
      - Decision
      # Project is shared with conversation namespace (standalone Project node)
      # Memory:Project nodes are classified via Memory root label
      - ContentTheme
      - Theme
      - Implementation
      - Phase
      - Strategy
      - CaseStudy
      - Architecture
      - Schema
      - Status
      - BusinessModel
      - Workflow
      - Research
      - Todo
      - Discussion
    naming: PascalCase

  archived:
    description: "Archived legacy nodes"
    labels:
      - Archived
    naming: PascalCase
